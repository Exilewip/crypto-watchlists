name: Update Crypto Watchlists

on:
  schedule:
    - cron: '0 2 * * *'   # chaque nuit à 2h UTC
  workflow_dispatch:        # bouton manuel dans GitHub

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install ccxt

      - name: Run watchlist fetcher
        run: python fetch_watchlists.py

      - name: Generate index HTML
        run: python generate_index.py

      - name: Commit updated watchlists
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add watchlists/ docs/
          git diff --staged --quiet || git commit -m "🔄 Update watchlists $(date +'%Y-%m-%d')"
          git push

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
